<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B2FA0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A1F7A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7E22CE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="70" fill="url(#inner)" />
  <!-- AI brain / neural network icon -->
  <g transform="translate(100,90)" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.95">
    <circle cx="0" cy="-18" r="5" fill="white" stroke="none"/>
    <circle cx="-16" cy="0" r="5" fill="white" stroke="none"/>
    <circle cx="16" cy="0" r="5" fill="white" stroke="none"/>
    <circle cx="-8" cy="16" r="5" fill="white" stroke="none"/>
    <circle cx="8" cy="16" r="5" fill="white" stroke="none"/>
    <line x1="0" y1="-13" x2="-11" y2="-3"/>
    <line x1="0" y1="-13" x2="11" y2="-3"/>
    <line x1="-11" y1="3" x2="-5" y2="11"/>
    <line x1="11" y1="3" x2="5" y2="11"/>
    <line x1="-11" y1="3" x2="5" y2="11"/>
    <line x1="11" y1="3" x2="-5" y2="11"/>
    <line x1="-5" y1="16" x2="3" y2="16"/>
  </g>
  <!-- Microsoft logo squares -->
  <g transform="translate(84,118)">
    <rect x="0" y="0" width="12" height="12" fill="#F25022" rx="1"/>
    <rect x="14" y="0" width="12" height="12" fill="#7FBA00" rx="1"/>
    <rect x="0" y="14" width="12" height="12" fill="#00A4EF" rx="1"/>
    <rect x="14" y="14" width="12" height="12" fill="#FFB900" rx="1"/>
  </g>
  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" opacity="0.9">MICROSOFT CERTIFIED</text>
  <text x="100" y="174" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="8" letter-spacing="0.3" opacity="0.75">AI-900</text>
</svg>
